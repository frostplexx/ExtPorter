<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Test Extension</title>
    <style>
        body {
            width: 350px;
            height: 400px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 300;
        }

        .header p {
            margin: 5px 0 0 0;
            opacity: 0.8;
            font-size: 14px;
        }

        .section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .section h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }

        .status.success {
            background: rgba(72, 187, 120, 0.3);
            border: 1px solid rgba(72, 187, 120, 0.5);
        }

        .status.error {
            background: rgba(245, 101, 101, 0.3);
            border: 1px solid rgba(245, 101, 101, 0.5);
        }

        .status.info {
            background: rgba(66, 153, 225, 0.3);
            border: 1px solid rgba(66, 153, 225, 0.5);
        }

        .counter {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
        }

        label {
            font-size: 14px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 Popup Test</h1>
        <p>Extension Testing Framework</p>
    </div>

    <div class="section">
        <h3>🎯 Actions</h3>
        <div class="button-group">
            <button id="inject-content" data-testid="inject-content-btn">
                Inject Content Script
            </button>
            <button id="highlight-page" data-testid="highlight-page-btn">
                Highlight Page Elements
            </button>
            <button id="change-background" data-testid="change-background-btn">
                Change Page Background
            </button>
            <button id="show-alert" data-testid="show-alert-btn">
                Show Page Alert
            </button>
        </div>
    </div>

    <div class="section">
        <h3>📊 Counter Test</h3>
        <div class="counter" id="counter" data-testid="counter">0</div>
        <div class="button-group">
            <button id="increment" data-testid="increment-btn">+ Increment</button>
            <button id="decrement" data-testid="decrement-btn">- Decrement</button>
            <button id="reset" data-testid="reset-btn">↻ Reset</button>
        </div>
    </div>

    <div class="section">
        <h3>⚙️ Settings</h3>
        <div class="checkbox-group">
            <div class="checkbox-item">
                <input type="checkbox" id="auto-inject" data-testid="auto-inject-checkbox">
                <label for="auto-inject">Auto-inject on page load</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="debug-mode" data-testid="debug-mode-checkbox">
                <label for="debug-mode">Debug mode</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="notifications" data-testid="notifications-checkbox" checked>
                <label for="notifications">Show notifications</label>
            </div>
        </div>
    </div>

    <div class="section">
        <h3>📝 Status</h3>
        <div id="status" data-testid="status-display" class="status info">
            Extension loaded successfully
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
