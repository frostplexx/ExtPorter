services:
  migrator-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: migrator-app
    restart: "no"  # Changed from unless-stopped to prevent infinite restarts
    environment:
      - LOG_LEVEL=info
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/migrator
      - DB_NAME=migrator
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./extensions:/app/extensions:ro
    command: ["npm", "start", "/app/extensions", "/app/output"]  # Pass correct paths as arguments
    depends_on:
      - mongodb
    networks:
      - migrator-network
    # Add security options for Chrome/Puppeteer
    security_opt:
      - seccomp:unconfined
    # Optionally add shared memory size for Chrome
    shm_size: 2gb

  mongodb:
    image: mongo:7.0
    container_name: migrator-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: migrator
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - migrator-network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: migrator-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - migrator-network

volumes:
  mongodb_data:

networks:
  migrator-network:
    driver: bridge
