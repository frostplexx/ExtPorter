services:
    migrator-server:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                USER_ID: ${UID:-424242}
                GROUP_ID: ${GID:-424242}
        container_name: migrator-server
        restart: unless-stopped
        ports:
            - '8080:8080'
        env_file:
            - .env
        environment:
            - MONGODB_URI=mongodb://admin:password@mongodb:27017/migrator?authSource=admin
            - INPUT_DIR=/app/extensions
            - OUTPUT_DIR=/app/output
            - CWS_DIR=/app/cws
        volumes:
            - ./logs:/app/logs
            - ${INPUT_DIR:-./extensions}:/app/extensions:ro
            - ${OUTPUT_DIR:-./output}:/app/output
            - ${CWS_DIR:-./cws}:/app/cws
        depends_on:
            - mongodb
        networks:
            - migrator-network

    mongodb:
        image: mongo
        container_name: migrator-mongodb
        restart: unless-stopped
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: password
            MONGO_INITDB_DATABASE: migrator
        volumes:
            - mongodb_data:/data/db
            - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
        networks:
            - migrator-network

volumes:
    mongodb_data:

networks:
    migrator-network:
        driver: bridge
