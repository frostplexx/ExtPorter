services:
    migrator-server:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: migrator-server
        restart: unless-stopped
        # Run as host user to avoid permission issues with mounted volumes
        user: '${UID:-1000}:${GID:-1000}'
        ports:
            - '8080:8080' # Expose WebSocket server for client connections
        env_file:
            - .env
        environment:
            # Override specific variables for Docker environment
            - MONGODB_URI=mongodb://admin:password@mongodb:27017/migrator?authSource=admin
        volumes:
            - ./logs:/app/logs:z
            # Mount the actual paths from .env file
            # :Z flag for private SELinux relabeling (use for dirs outside project)
            - ${INPUT_DIR:-./extensions}:${INPUT_DIR:-./extensions}:ro,z
            - ${OUTPUT_DIR:-./output}:${OUTPUT_DIR:-./output}:Z
        depends_on:
            - mongodb
        networks:
            - migrator-network
        # Add security options for Chrome/Puppeteer
        security_opt:
            - seccomp:unconfined
            - label=disable
        # Optionally add shared memory size for Chrome
        shm_size: 2gb

    mongodb:
        image: mongo
        container_name: migrator-mongodb
        restart: unless-stopped
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: password
            MONGO_INITDB_DATABASE: migrator
        volumes:
            - mongodb_data:/data/db
            - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
        networks:
            - migrator-network

volumes:
    mongodb_data:

networks:
    migrator-network:
        driver: bridge
