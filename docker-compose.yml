services:
    migrator-server:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: migrator-server
        restart: unless-stopped
        ports:
            - '8080:8080' # Expose WebSocket server for client connections
        environment:
            - LOG_LEVEL=${LOG_LEVEL:-info}
            - MONGODB_URI=${MONGODB_URI_DOCKER:-mongodb://admin:password@mongodb:27017/migrator}
            - DB_NAME=${DB_NAME:-migrator}
            - INPUT_DIR=${INPUT_DIR:-/app/extensions}
            - OUTPUT_DIR=${OUTPUT_DIR:-/app/output}
        volumes:
            - ./output:/app/output
            - ./logs:/app/logs
            - ./extensions:/app/extensions:ro
            - ./.env:/app/.env:ro # Mount .env file for additional configuration
        depends_on:
            - mongodb
        networks:
            - migrator-network
        # Add security options for Chrome/Puppeteer
        security_opt:
            - seccomp:unconfined
        # Optionally add shared memory size for Chrome
        shm_size: 2gb

    mongodb:
        image: mongo
        container_name: migrator-mongodb
        restart: unless-stopped
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: password
            MONGO_INITDB_DATABASE: migrator
        volumes:
            - mongodb_data:/data/db
            - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
        networks:
            - migrator-network

volumes:
    mongodb_data:

networks:
    migrator-network:
        driver: bridge
