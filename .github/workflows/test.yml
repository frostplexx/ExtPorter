---
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
          MONGO_INITDB_DATABASE: migrator
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'yarn'

    - name: Install Chrome and dependencies in parallel
      run: |
        # Install Chrome 138 in background
        (sudo apt-get update && wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add - && echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list && sudo apt-get update && sudo apt-get install -y google-chrome-stable=138.0.6478.182-1) &
        CHROME_PID=$!

        # Install Node dependencies in parallel
        yarn install --frozen-lockfile &
        YARN_PID=$!

        # Wait for both to complete
        wait $CHROME_PID
        wait $YARN_PID

    - name: Build project
      run: yarn build

    - name: Run linting
      run: yarn lint

    - name: Run unit tests
      run: yarn test:unit
      env:
        MONGODB_URI: mongodb://admin:password@localhost:27017/migrator?authSource=admin
        DB_NAME: migrator

    - name: Run integration tests
      run: yarn test:integration
      env:
        MONGODB_URI: mongodb://admin:password@localhost:27017/migrator?authSource=admin
        DB_NAME: migrator

    - name: Run Puppeteer tests
      run: yarn test:puppeteer
      env:
        CI: true
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: false
        PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
        PUPPETEER_HEADLESS: true

    - name: Run all tests with coverage
      run: yarn test:coverage
      env:
        CI: true
        MONGODB_URI: mongodb://admin:password@localhost:27017/migrator?authSource=admin
        DB_NAME: migrator
        PUPPETEER_HEADLESS: true
        PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
